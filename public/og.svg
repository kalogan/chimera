<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="CHIMERA — Aldercradle is fading. Weave it back to life.">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe3f7"/>
      <stop offset="1" stop-color="#8ec5e6"/>
    </linearGradient>
    <radialGradient id="body" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ffe3b0"/>
      <stop offset="0.55" stop-color="#f4a86b"/>
      <stop offset="1" stop-color="#d97a4d"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0b1a26" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#sky)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#vignette)"/>

  <!-- goober blob, off to the left of the text -->
  <g transform="translate(190,315)">
    <path d="M0 -110
             C 66 -110, 112 -66, 106 -2
             C 100 60, 56 108, -6 104
             C -72 100, -116 54, -110 -6
             C -104 -66, -66 -110, 0 -110 Z"
          fill="url(#body)" stroke="#8a3f22" stroke-width="3" stroke-opacity="0.35"/>
    <path d="M-46 -92 C -58 -122, -80 -128, -96 -114 C -84 -96, -68 -84, -46 -92 Z" fill="#c86a3d"/>
    <path d="M46 -92 C 58 -122, 80 -128, 96 -114 C 84 -96, 68 -84, 46 -92 Z" fill="#c86a3d"/>
    <circle cx="-32" cy="-8" r="17" fill="#2b1a14"/>
    <circle cx="32" cy="-8" r="17" fill="#2b1a14"/>
    <circle cx="-26" cy="-15" r="5.2" fill="#fff" fill-opacity="0.85"/>
    <circle cx="38" cy="-15" r="5.2" fill="#fff" fill-opacity="0.85"/>
    <path d="M-16 32 Q0 50 16 32" fill="none" stroke="#5a2c16" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-56" cy="20" r="10" fill="#e8577a" fill-opacity="0.35"/>
    <circle cx="56" cy="20" r="10" fill="#e8577a" fill-opacity="0.35"/>
  </g>

  <!-- title + tagline -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="400" y="300" font-size="88" font-weight="700" fill="#2b1a14" letter-spacing="2">CHIMERA</text>
    <text x="400" y="365" font-size="34" fill="#3f2a1f">Aldercradle is fading.</text>
    <text x="400" y="410" font-size="34" fill="#3f2a1f">Weave it back to life.</text>
  </g>
</svg>
