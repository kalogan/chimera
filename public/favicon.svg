<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Chimera goober">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe3f7"/>
      <stop offset="1" stop-color="#8ec5e6"/>
    </linearGradient>
    <radialGradient id="body" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ffe3b0"/>
      <stop offset="0.55" stop-color="#f4a86b"/>
      <stop offset="1" stop-color="#d97a4d"/>
    </radialGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#sky)"/>
  <!-- goober blob body: soft asymmetric shape, a little squash-and-stretch -->
  <path d="M32 12
           C 44 12, 52 20, 51 32
           C 50 43, 42 52, 30 51
           C 19 50, 11 41, 12 30
           C 13 19, 21 12, 32 12 Z"
        fill="url(#body)" stroke="#8a3f22" stroke-width="1.2" stroke-opacity="0.35"/>
  <!-- two small nub horns, chimera hint -->
  <path d="M24 15 C 22 10, 19 9, 17 11 C 19 14, 21 16, 24 15 Z" fill="#c86a3d"/>
  <path d="M40 15 C 42 10, 45 9, 47 11 C 45 14, 43 16, 40 15 Z" fill="#c86a3d"/>
  <!-- big wistful eyes -->
  <circle cx="25" cy="31" r="5.2" fill="#2b1a14"/>
  <circle cx="39" cy="31" r="5.2" fill="#2b1a14"/>
  <circle cx="26.6" cy="29" r="1.6" fill="#fff" fill-opacity="0.85"/>
  <circle cx="40.6" cy="29" r="1.6" fill="#fff" fill-opacity="0.85"/>
  <!-- small closed smile -->
  <path d="M28 40 Q32 44 36 40" fill="none" stroke="#5a2c16" stroke-width="2" stroke-linecap="round"/>
  <!-- cheek blush -->
  <circle cx="20" cy="37" r="2.6" fill="#e8577a" fill-opacity="0.35"/>
  <circle cx="44" cy="37" r="2.6" fill="#e8577a" fill-opacity="0.35"/>
</svg>
